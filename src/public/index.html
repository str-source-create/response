<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hostaway Collector Local UI</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020;
        color: #e7ecff;
      }
      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 { margin-top: 0; }
      .card {
        background: #111833;
        border: 1px solid #2b376f;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #4153a3;
        background: #0a1232;
        color: #eef2ff;
      }
      button, a.btn {
        border: 0;
        background: #4f7cff;
        color: white;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
      }
      button.secondary, a.btn.secondary { background: #24346d; }
      .links { display: flex; flex-wrap: wrap; gap: 8px; }
      pre {
        white-space: pre-wrap;
        background: #070c1f;
        border: 1px solid #26315e;
        border-radius: 8px;
        padding: 12px;
        min-height: 80px;
      }
      .muted { color: #b7c2eb; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Hostaway → Neon Collector</h1>
      <p class="muted">Single-page local UI for manual sync + CSV download.</p>

      <section class="card">
        <h2>Sync by Property Name</h2>
        <div class="row">
          <input id="propertyName" placeholder="e.g. Beach Villa" />
          <button id="syncPropertyBtn">Sync Property</button>
        </div>
      </section>

      <section class="card">
        <h2>Sync by Reservation ID</h2>
        <div class="row">
          <input id="reservationId" placeholder="e.g. 123456" />
          <button id="syncReservationBtn" class="secondary">Sync Reservation</button>
        </div>
      </section>

      <section class="card">
        <h2>Sync by Conversation ID</h2>
        <div class="row">
          <input id="conversationId" placeholder="e.g. 987654" />
          <button id="syncConversationBtn" class="secondary">Sync Conversation</button>
        </div>
      </section>

      <section class="card">
        <h2>CSV Downloads</h2>
        <div class="links">
          <a class="btn" href="/export/properties.csv" download>Properties CSV</a>
          <a class="btn" href="/export/reservations.csv" download>Reservations CSV</a>
          <a class="btn" href="/export/conversations.csv" download>Conversations CSV</a>
          <a class="btn" href="/export/messages.csv" download>Messages CSV</a>
        </div>
      </section>

      <section class="card">
        <h2>Response</h2>
        <pre id="output">Ready.</pre>
      </section>
    </main>

    <script>
      const output = document.getElementById("output");
      function setOutput(data) {
        output.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: body ? JSON.stringify(body) : undefined,
        });
        const text = await response.text();
        let payload;
        try { payload = JSON.parse(text); } catch { payload = text; }
        if (!response.ok) {
          throw new Error(typeof payload === "string" ? payload : JSON.stringify(payload));
        }
        return payload;
      }

      document.getElementById("syncPropertyBtn").addEventListener("click", async () => {
        const propertyName = document.getElementById("propertyName").value.trim();
        if (!propertyName) return setOutput("Please enter property name.");
        setOutput("Syncing property...");
        try {
          const data = await postJson("/sync/property", { propertyName });
          setOutput(data);
        } catch (error) {
          setOutput(error.message);
        }
      });

      document.getElementById("syncReservationBtn").addEventListener("click", async () => {
        const id = document.getElementById("reservationId").value.trim();
        if (!id) return setOutput("Please enter reservation ID.");
        setOutput("Syncing reservation...");
        try {
          const data = await postJson(`/sync/reservation/${encodeURIComponent(id)}`);
          setOutput(data);
        } catch (error) {
          setOutput(error.message);
        }
      });

      document.getElementById("syncConversationBtn").addEventListener("click", async () => {
        const id = document.getElementById("conversationId").value.trim();
        if (!id) return setOutput("Please enter conversation ID.");
        setOutput("Syncing conversation...");
        try {
          const data = await postJson(`/sync/conversation/${encodeURIComponent(id)}`);
          setOutput(data);
        } catch (error) {
          setOutput(error.message);
        }
      });
    </script>
  </body>
</html>
